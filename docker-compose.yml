version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tumor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tumor_db}
      POSTGRES_USER: ${POSTGRES_USER:-tumor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tumor_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tumor_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Celery broker + cache) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tumor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tumor_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tumor_user}:${POSTGRES_PASSWORD:-tumor_secret}@postgres:5432/${POSTGRES_DB:-tumor_db}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - dicom_storage:/app/storage/dicom
      - model_weights:/app/models/weights
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── Celery Worker (async AI tasks) ──────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tumor_celery
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-tumor_user}:${POSTGRES_PASSWORD:-tumor_secret}@postgres:5432/${POSTGRES_DB:-tumor_db}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - dicom_storage:/app/storage/dicom
      - model_weights:/app/models/weights
    depends_on:
      - redis
      - postgres

  # ─── Celery Flower (monitor) ──────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: tumor_flower
    restart: unless-stopped
    command: celery flower --broker=redis://redis:6379/0 --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ─── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tumor_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  dicom_storage:
  model_weights:
